- title: Open-Source Software
  type: nested_list
  contents:
    - title: MonSTer
      items:
        - An out-of-the-box monitoring tool for HPC platforms. Presented at CLUSTER'20 and adopted by Dell's Omnia project.
    - title: Disaggregation-Aware Scheduler
      items:
        - Simulator for exploring job scheduling strategies in HPC systems with disaggregated memory. Used in CLUSTER'24 and IPDPSW'24 publications.
    - title: xBGAS REV-CPU & Runtime
      items:
        - Cycle-accurate simulation extension and runtime for the xBGAS RISC-V architecture, developed with Tactical Computing Laboratories. Presented at ICNC'24.

